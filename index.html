<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bihar Tenders Portal</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 40px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #1e3a8a; border-bottom: 3px solid #3b82f6; padding-bottom: 10px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 5px solid #3b82f6; }
        .card h3 { margin: 0 0 10px 0; color: #2c3e50; font-size: 1.2rem; }
        .card p { margin: 5px 0; color: #64748b; font-size: 0.95rem; }
        .btn { display: inline-block; background-color: #2563eb; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; font-weight: bold; font-size: 0.85rem; margin-top: 10px; }
        .btn:hover { background-color: #1d4ed8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔴 Live Bihar Government Tender Dashboard</h1>
        <div id="loading">Syncing secure database modules...</div>
        <div id="tender-display"></div>
    </div>

    <script>
        // Reads the JSON file compiled by GitHub Actions
        fetch('./tenders.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                let htmlOutput = '';
                
                data.forEach(item => {
                    htmlOutput += `
                        <div class="card">
                            <h3>${item.title}</h3>
                            <p><strong>Tender Identification:</strong> ${item.id}</p>
                            <p><strong>Submission Deadline Date:</strong> ${item.date}</p>
                            <a class="btn" href="https://eprocure.gov.in" target="_blank">📥 View Official PDF Document</a>
                        </div>
                    `;
                });
                document.getElementById('tender-display').innerHTML = htmlOutput;
            })
            .catch(err => {
                document.getElementById('loading').innerText = "Failed to synchronize dataset feed.";
                console.error(err);
            });
    </script>
</body>
</html>
