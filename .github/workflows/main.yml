name: Hourly Bihar Tender Scraper Loop

on:
  schedule:
    - cron: '0 * * * *' # Instructs system to run at minute 0 of every hour
  workflow_dispatch: # Allows you to also trigger it manually with a single click

permissions:
  contents: write

jobs:
  run-scraper-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository files to Cloud Agent
        uses: actions/checkout@v4

      - name: Spin up default runtime Node layer
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Execute background scraper logic script
        run: node scraper.js

      - name: Check for document changes and push live updates
        run: |
          git config --global user.name "GitHub Action Cloud Bot"
          git config --global user.email "actions@github.com"
          git add tenders.json
          git diff-index --quiet HEAD || git commit -m "Automated update of live Bihar data feed"
          git push
